name: Keep Backend Awake

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to Render
        run: |
          curl -i -H "User-Agent: GitHub-Keep-Alive-Bot" https://job-ai-iwg9.onrender.com/